name: pitch_translator
description: Pitch Translator mobile app (Flutter UI + Training Engine).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  pt_contracts:
    path: ../../packages/pt_contracts
  pt_audio_plugin:
    path: ../../packages/pt_audio_plugin
  shared_preferences: ^2.3.2
  sqflite: ^2.4.1
  path: ^1.9.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  sqflite_common_ffi: 2.3.2

flutter:
  uses-material-design: true


dependency_overrides:
  sqlite3: 2.4.7
