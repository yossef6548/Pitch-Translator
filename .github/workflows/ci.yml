name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  architecture_guard:
    name: Architecture guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run architecture guard
        run: bash qa/scripts/architecture_guard.sh

  flutter_checks:
    name: Flutter analyze + test + APK builds
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile_flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Flutter pub get
        run: flutter pub get
      - name: Flutter analyze
        run: flutter analyze
      - name: Flutter test
        run: flutter test
      - name: Flutter build apk (debug)
        run: flutter build apk --debug
      - name: Flutter build apk (release)
        run: flutter build apk --release

  dsp:
    name: DSP cmake + ctest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure DSP
        run: cmake -S dsp -B build/dsp
      - name: Build DSP
        run: cmake --build build/dsp
      - name: Run DSP tests
        run: ctest --test-dir build/dsp --output-on-failure

  ios_validation_deferred:
    name: iOS CI coverage deferred (documented)
    runs-on: ubuntu-latest
    steps:
      - name: Explain iOS runner scope
        run: echo 'iOS build is intentionally deferred to macOS runner coverage; see README.'
