name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  flutter:
    name: Flutter analyze + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile_flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Flutter pub get
        run: flutter pub get
      - name: Flutter analyze
        run: flutter analyze
      - name: Flutter test
        run: flutter test

  dsp:
    name: DSP cmake + ctest + validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure DSP
        run: cmake -S dsp -B build/dsp
      - name: Build DSP
        run: cmake --build build/dsp --config Release
      - name: Run DSP tests with ctest
        run: ctest --test-dir build/dsp --output-on-failure -C Release

  android:
    name: Android native build + debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile_flutter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Android NDK
        run: sdkmanager "ndk;26.3.11579264"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build native Android bridge with CMake (NDK)
        run: |
          cmake -S ../../native/android/src/main/cpp -B ../../build/native-android \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_SDK_ROOT/ndk/26.3.11579264/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release
      - name: Compile native Android bridge
        run: cmake --build ../../build/native-android
      - name: Flutter pub get
        run: flutter pub get
      - name: Assemble debug APK
        run: flutter build apk --debug

  ios:
    name: iOS build (no signing)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/mobile_flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Flutter pub get
        run: flutter pub get
      - name: Build iOS (no signing)
        run: flutter build ios --debug --no-codesign
