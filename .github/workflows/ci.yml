name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  flutter:
    name: Flutter analyze + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile_flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Flutter pub get
        run: flutter pub get
      - name: Flutter analyze
        run: flutter analyze lib/
      - name: Flutter test
        run: |
          flutter test $(find test -name "*_test.dart" \
            | grep -v "drift_replay_test\|exercise_config_screen_test" \
            | tr '\n' ' ')

  dsp:
    name: DSP cmake + ctest + validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure DSP
        run: cmake -S dsp -B build/dsp
      - name: Build DSP
        run: cmake --build build/dsp --config Release
      - name: Run DSP tests with ctest
        run: ctest --test-dir build/dsp --output-on-failure -C Release

  android:
    name: Android release APK build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile_flutter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install Android NDK
        run: sdkmanager "ndk;26.3.11579264"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Flutter pub get
        run: flutter pub get
      - name: Create Android platform folder
        run: flutter create --platforms android .
      - name: Assemble release APK
        run: flutter build apk --release

  ios:
    name: iOS build (no signing)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/mobile_flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Flutter pub get
        run: flutter pub get
      - name: Create iOS platform folder
        run: flutter create --platforms ios .
      - name: Build iOS release (no signing)
        run: flutter build ios --release --no-codesign
